openapi: 3.0.3
info:
  title: Delivery Service API
  version: 1.0.0
  license:
    name: Proprietary
  description: Current delivery service stub endpoints.
servers:
  - url: http://delivery:8080
security: []
paths:
  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics
      operationId: deliveryMetrics
      responses:
        '200':
          description: Prometheus metrics response
          content:
            text/plain:
              schema:
                type: string

  /:
    get:
      tags: [System]
      summary: Service hello endpoint
      operationId: deliveryHello
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Service response
          content:
            text/plain:
              schema:
                type: string
                example: hello from delivery service
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Error401'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
