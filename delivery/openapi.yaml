openapi: 3.0.3
info:
  title: Delivery Service API
  version: 1.0.0
  license:
    name: Proprietary
  description: Current delivery service stub endpoints.
servers:
  - url: http://localhost:8080
security: []
paths:
  /:
    get:
      tags: [System]
      summary: Service hello endpoint
      operationId: deliveryHello
      responses:
        '200':
          description: Service response
          content:
            text/plain:
              schema:
                type: string
                example: hello from delivery service
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
