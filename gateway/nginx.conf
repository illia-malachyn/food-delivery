events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 8080;
    server_name _;
    set $auth_upstream http://auth:8080;
    set $order_upstream http://order:8080;

    location = /healthz {
      default_type application/json;
      return 200 '{"status":"ok"}';
    }

    location = /auth/healthz {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass $auth_upstream/healthz;
    }

    location /auth/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass $auth_upstream;
    }

    location = /orders {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass $order_upstream/orders;
    }

    location /orders/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass $order_upstream;
    }

    location / {
      return 404;
    }
  }
}
