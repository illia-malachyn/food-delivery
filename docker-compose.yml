services:
  postgres:
    image: postgres:18.3-alpine
    container_name: postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_DB}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d ${POSTGRES_ADMIN_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      # Persist PostgreSQL data across container restarts
      - postgres_data:/var/lib/postgresql
      # Auto-run initialization scripts (.sh/.sql) on first startup when data directory is empty
      # Scripts execute alphabetically - use prefixes like 01-, 02- to control order
      - ./order/docker/postgres/init/01-init-order-db.sh:/docker-entrypoint-initdb.d/01-init-order-db.sh
      - ./payment/docker/postgres/init/02-init-payment-db.sh:/docker-entrypoint-initdb.d/02-init-payment-db.sh
      - ./delivery/docker/postgres/init/03-init-delivery-db.sh:/docker-entrypoint-initdb.d/03-init-delivery-db.sh
      - ./restaurant/docker/postgres/init/04-init-restaurant-db.sh:/docker-entrypoint-initdb.d/04-init-restaurant-db.sh
      - ./auth/docker/postgres/init/05-init-auth-db.sh:/docker-entrypoint-initdb.d/05-init-auth-db.sh

  redis:
    image: redis:8.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-connect:
    image: debezium/connect:2.6
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: kafka-connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      ENABLE_DEBEZIUM_SCRIPTING: "false"
    depends_on:
      kafka:
        condition: service_healthy

  order-migrate:
    build:
      context: .
      dockerfile: ./order/Dockerfile
    container_name: order-migrate
    env_file:
      - ./order/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/migrate"]
    restart: on-failure

  order:
    build:
      context: .
      dockerfile: ./order/Dockerfile
    container_name: order
    env_file:
      - ./order/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:9092
    depends_on:
      order-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: ./payment/Dockerfile
    container_name: payment
    env_file:
      - ./payment/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:9092
    depends_on:
      payment-migrate:
        condition: service_completed_successfully
      payment-cdc-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  payment-migrate:
    build:
      context: .
      dockerfile: ./payment/Dockerfile
    container_name: payment-migrate
    env_file:
      - ./payment/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/migrate"]
    restart: on-failure

  payment-cdc-init:
    image: curlimages/curl:8.16.0
    container_name: payment-cdc-init
    environment:
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      PAYMENT_CONNECTOR_NAME: payment-outbox-connector
      PAYMENT_DB_HOST: postgres
      PAYMENT_DB_PORT: 5432
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME}
      PAYMENT_DB_USER: ${PAYMENT_DB_USER}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      KAFKA_TOPIC_PAYMENT_EVENTS: payment.events
    depends_on:
      payment-migrate:
        condition: service_completed_successfully
      kafka-connect:
        condition: service_started
    volumes:
      - ./payment/docker/debezium/register-payment-connector.sh:/work/register-payment-connector.sh:ro
    command: ["/bin/sh", "/work/register-payment-connector.sh"]

  delivery:
    build:
      context: .
      dockerfile: ./delivery/Dockerfile
    container_name: delivery
    depends_on:
      delivery-migrate:
        condition: service_completed_successfully

  delivery-migrate:
    build:
      context: .
      dockerfile: ./delivery/Dockerfile
    container_name: delivery-migrate
    env_file:
      - ./delivery/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/migrate"]
    restart: on-failure

  restaurant:
    build:
      context: .
      dockerfile: ./restaurant/Dockerfile
    container_name: restaurant
    depends_on:
      restaurant-migrate:
        condition: service_completed_successfully

  restaurant-migrate:
    build:
      context: .
      dockerfile: ./restaurant/Dockerfile
    container_name: restaurant-migrate
    env_file:
      - ./restaurant/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/migrate"]
    restart: on-failure

  auth:
    build:
      context: .
      dockerfile: ./auth/Dockerfile
    container_name: auth
    env_file:
      - ./auth/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth:
        condition: service_started
      order:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      auth:
        condition: service_started
      order:
        condition: service_started
      payment:
        condition: service_started
      delivery:
        condition: service_started
      restaurant:
        condition: service_started

  grafana:
    image: grafana/grafana:11.5.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  auth-migrate:
    build:
      context: .
      dockerfile: ./auth/Dockerfile
    container_name: auth-migrate
    env_file:
      - ./auth/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/migrate"]

volumes:
  # Named volume for PostgreSQL data persistence
  # Remove with: docker compose down -v
  postgres_data:
