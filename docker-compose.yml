services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_DB}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ORDER_DB_NAME: ${ORDER_DB_NAME}
      ORDER_DB_USER: ${ORDER_DB_USER}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d ${POSTGRES_ADMIN_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  order:
    build:
      context: ./order
      dockerfile: Dockerfile
    container_name: order
    environment:
      ORDER_DB_NAME: ${ORDER_DB_NAME}
      ORDER_DB_USER: ${ORDER_DB_USER}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
      ORDER_DB_HOST: postgres
      ORDER_DB_PORT: ${ORDER_DB_PORT}
      ORDER_DB_SSLMODE: ${ORDER_DB_SSLMODE}
    ports:
      - "9876:9876"
    depends_on:
      postgres:
        condition: service_healthy

  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    container_name: payment

  delivery:
    build:
      context: ./delivery
      dockerfile: Dockerfile
    container_name: delivery

  restaurant:
    build:
      context: ./restaurant
      dockerfile: Dockerfile
    container_name: restaurant

volumes:
  postgres_data:
