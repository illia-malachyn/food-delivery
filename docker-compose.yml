services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    env_file:
      - ./order/.env
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_DB}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d ${POSTGRES_ADMIN_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      # Persist PostgreSQL data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Auto-run initialization scripts (.sh/.sql) on first startup when data directory is empty
      # Scripts execute alphabetically - use prefixes like 01-, 02- to control order
      - ./order/docker/postgres/init:/docker-entrypoint-initdb.d

  order-migrate:
    build:
      context: ./order
      dockerfile: Dockerfile
    container_name: order-migrate
    env_file:
      - ./order/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/migrate"]
    restart: on-failure

  order:
    build:
      context: ./order
      dockerfile: Dockerfile
    container_name: order
    env_file:
      - ./order/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "9876:9876"
    depends_on:
      order-migrate:
        condition: service_completed_successfully

  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    container_name: payment

  delivery:
    build:
      context: ./delivery
      dockerfile: Dockerfile
    container_name: delivery

  restaurant:
    build:
      context: ./restaurant
      dockerfile: Dockerfile
    container_name: restaurant

volumes:
  # Named volume for PostgreSQL data persistence
  # Remove with: docker compose down -v
  postgres_data:
