openapi: 3.0.3
info:
  title: Auth Service API
  version: 1.0.0
  license:
    name: Proprietary
  description: Authentication API for register/login/refresh/logout and current principal lookup.
servers:
  - url: http://localhost:8080
security: []
paths:
  /healthz:
    get:
      tags: [System]
      summary: Health check
      operationId: authHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsRequest'
      responses:
        '201':
          description: Registered successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly refresh token cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsRequest'
      responses:
        '200':
          description: Logged in successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly refresh token cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token pair
      operationId: refresh
      security:
        - RefreshCookie: []
      responses:
        '200':
          description: Token pair refreshed
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Rotated HttpOnly refresh token cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current refresh session
      operationId: logout
      security:
        - RefreshCookie: []
      responses:
        '204':
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears refresh token cookie.
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

  /auth/me:
    get:
      tags: [Auth]
      summary: Current access principal
      operationId: me
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current principal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    RefreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token

  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    CredentialsRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          minLength: 1
          example: secret123

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          description: Access token TTL in seconds.
          example: 900

    PrincipalResponse:
      type: object
      required: [user_id, email]
      properties:
        user_id:
          type: integer
          format: int64
          example: 42
        email:
          type: string
          format: email
          example: alice@example.com

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
