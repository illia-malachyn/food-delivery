openapi: 3.0.3
info:
  title: Payment Service API
  version: 1.0.0
  license:
    name: Proprietary
  description: Payment creation and state transition endpoints.
servers:
  - url: http://payment:8080
security: []
paths:
  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics
      operationId: paymentMetrics
      responses:
        '200':
          description: Prometheus metrics response
          content:
            text/plain:
              schema:
                type: string

  /:
    get:
      tags: [System]
      summary: Service hello endpoint
      operationId: paymentHello
      responses:
        '200':
          description: Service response
          content:
            text/plain:
              schema:
                type: string
                example: hello from payment service

  /payments:
    post:
      tags: [Payments]
      summary: Create payment
      operationId: createPayment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

  /payments/{id}/pay:
    post:
      tags: [Payments]
      summary: Mark payment paid
      operationId: markPaymentPaid
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '204':
          description: Payment marked paid
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /payments/{id}/fail:
    post:
      tags: [Payments]
      summary: Mark payment failed
      operationId: markPaymentFailed
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkPaymentFailedRequest'
      responses:
        '204':
          description: Payment marked failed
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /payments/{id}/refund:
    post:
      tags: [Payments]
      summary: Refund payment
      operationId: refundPayment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '204':
          description: Payment refunded
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PaymentId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Payment identifier.
      example: 4eaebf88-d08b-4f8f-bf65-0f9e3b6e3f66

  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CreatePaymentRequest:
      type: object
      additionalProperties: false
      required: [order_id, amount, currency]
      properties:
        order_id:
          type: string
          example: 4eaebf88-d08b-4f8f-bf65-0f9e3b6e3f66
        amount:
          type: integer
          format: int64
          minimum: 1
          example: 1200
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD

    CreatePaymentResponse:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: string
          description: Created payment identifier.
          example: 4eaebf88-d08b-4f8f-bf65-0f9e3b6e3f66

    MarkPaymentFailedRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          example: declined

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
