name: CI Build & Tests

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [order, payment, delivery, restaurant, auth]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: go test ./...

  integration-tests:
    name: Integration Tests ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [auth, order, payment]
    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod

      - name: Run integration tests
        run: go test -tags=integration ./integration_tests/... -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare env files for compose
        run: make env-init

      - name: Generate local JWT keys
        run: make jwt-keys

      - name: Start stack
        run: docker compose up --build -d

      - name: Run e2e tests
        run: make e2e-tests

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --no-color || true

      - name: Stop stack
        if: always()
        run: docker compose down -v || true
