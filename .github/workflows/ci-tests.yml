name: CI Build & Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test-services:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [order, payment, delivery, restaurant, auth]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./...

  integration-tests:
    name: Integration Tests (auth)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/go.mod

      - name: Run integration tests
        run: go test -tags=integration ./integration_tests -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start stack
        run: docker compose up --build -d

      - name: Run e2e tests
        run: make e2e

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
