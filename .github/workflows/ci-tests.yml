name: CI Build & Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test-services:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [order, payment, delivery, restaurant]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./...
