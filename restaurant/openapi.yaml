openapi: 3.0.3
info:
  title: Restaurant Service API
  version: 1.0.0
  license:
    name: Proprietary
  description: Current restaurant service stub endpoints.
servers:
  - url: http://restaurant:8080
security: []
paths:
  /:
    get:
      tags: [System]
      summary: Service hello endpoint
      operationId: restaurantHello
      responses:
        '200':
          description: Service response
          content:
            text/plain:
              schema:
                type: string
                example: hello from restaurant service
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
