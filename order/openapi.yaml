openapi: 3.0.3
info:
  title: Order Service API
  version: 1.0.0
  license:
    name: Proprietary
  description: Order creation and state transition endpoints.
servers:
  - url: http://localhost:8080
security: []
paths:
  /healthz:
    get:
      tags: [System]
      summary: Health check
      operationId: orderHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics
      operationId: orderMetrics
      responses:
        '200':
          description: Prometheus metrics response
          content:
            text/plain:
              schema:
                type: string

  /orders:
    post:
      tags: [Orders]
      summary: Create order
      operationId: createOrder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          $ref: '#/components/responses/Error400Text'
        '401':
          $ref: '#/components/responses/Error401JSON'

  /orders/{id}/confirm:
    post:
      tags: [Orders]
      summary: Confirm order
      operationId: confirmOrder
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order confirmed
        '400':
          $ref: '#/components/responses/Error400Text'
        '401':
          $ref: '#/components/responses/Error401JSON'

  /orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel order
      operationId: cancelOrder
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: Order canceled
        '400':
          $ref: '#/components/responses/Error400Text'
        '401':
          $ref: '#/components/responses/Error401JSON'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Order identifier.
      example: 4eaebf88-d08b-4f8f-bf65-0f9e3b6e3f66

  responses:
    Error400Text:
      description: Bad request
      content:
        text/plain:
          schema:
            type: string
    Error401JSON:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    CreateOrderRequest:
      type: object
      additionalProperties: false
      required: [user_id, item_id, quantity]
      properties:
        user_id:
          type: string
          example: u-1
        item_id:
          type: string
          example: pizza
        quantity:
          type: integer
          minimum: 0
          example: 2

    CreateOrderResponse:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: string
          description: Created order identifier.
          example: 4eaebf88-d08b-4f8f-bf65-0f9e3b6e3f66

    CancelOrderRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          example: payment failed

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
